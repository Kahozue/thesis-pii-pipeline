<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1620" width="2000" height="1620" font-family="Microsoft JhengHei, PingFang TC, sans-serif">
  <defs>
    <marker id="arrowSync" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrowSensS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#B45309"/>
    </marker>
    <marker id="arrowDeidS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0E7490"/>
    </marker>
    <marker id="arrowOpenS" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="2000" height="1620" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="1000" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#111827">時序圖 (Sequence Diagram)</text>
  <text x="1000" y="68" text-anchor="middle" font-size="15" fill="#374151">每日午夜批次:資料收集 → 去識別化 → LLM 分析 → 授權還原</text>

  <!-- Actor boxes -->
  <!-- Positions x: 100, 320, 540, 760, 980, 1200, 1420, 1640, 1880 -->
  <!-- Each box width 180 -->

  <!-- Scheduler -->
  <rect x="10" y="100" width="180" height="65" fill="#FEF3C7" stroke="#B45309" stroke-width="2" rx="6"/>
  <text x="100" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">Scheduler</text>
  <text x="100" y="148" text-anchor="middle" font-size="11" fill="#374151">Cron 0 0 * * *</text>

  <!-- System A -->
  <rect x="230" y="100" width="180" height="65" fill="#FEE2E2" stroke="#B45309" stroke-width="2" rx="6"/>
  <text x="320" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">System A</text>
  <text x="320" y="148" text-anchor="middle" font-size="11" fill="#374151">內部資料層 (敏感)</text>

  <!-- Graph API -->
  <rect x="450" y="100" width="180" height="65" fill="#F3F4F6" stroke="#374151" stroke-width="2" rx="6"/>
  <text x="540" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">Graph API</text>
  <text x="540" y="148" text-anchor="middle" font-size="11" fill="#374151">外部資料介面</text>

  <!-- Deid Module -->
  <rect x="670" y="100" width="180" height="65" fill="#FDF4FF" stroke="#7E22CE" stroke-width="2" rx="6"/>
  <text x="760" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">去識別化模組</text>
  <text x="760" y="148" text-anchor="middle" font-size="11" fill="#374151">A/B 交接層</text>

  <!-- System B -->
  <rect x="890" y="100" width="180" height="65" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="2" rx="6"/>
  <text x="980" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">System B</text>
  <text x="980" y="148" text-anchor="middle" font-size="11" fill="#374151">對外分析層</text>

  <!-- LLM -->
  <rect x="1110" y="100" width="180" height="65" fill="#F3F4F6" stroke="#374151" stroke-width="2" rx="6"/>
  <text x="1200" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">外部 LLM</text>
  <text x="1200" y="148" text-anchor="middle" font-size="11" fill="#374151">OpenAI / Gemini</text>

  <!-- Dashboard -->
  <rect x="1330" y="100" width="180" height="65" fill="#ECFDF5" stroke="#047857" stroke-width="2" rx="6"/>
  <text x="1420" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">管理後台</text>
  <text x="1420" y="148" text-anchor="middle" font-size="11" fill="#374151">前端</text>

  <!-- Reversal Module -->
  <rect x="1550" y="100" width="180" height="65" fill="#FFF7ED" stroke="#C2410C" stroke-width="2" rx="6"/>
  <text x="1640" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">授權還原模組</text>
  <text x="1640" y="148" text-anchor="middle" font-size="11" fill="#374151">RBAC + 稽核</text>

  <!-- Authorized Personnel -->
  <rect x="1790" y="100" width="180" height="65" fill="#F5F3FF" stroke="#5B21B6" stroke-width="2" rx="6"/>
  <text x="1880" y="128" text-anchor="middle" font-size="14" font-weight="bold" fill="#111827">授權人員</text>
  <text x="1880" y="148" text-anchor="middle" font-size="11" fill="#374151">資安/法遵</text>

  <!-- Lifelines (down to y=1500) -->
  <line x1="100" y1="170" x2="100" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="320" y1="170" x2="320" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="540" y1="170" x2="540" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="760" y1="170" x2="760" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="980" y1="170" x2="980" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="1200" y1="170" x2="1200" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="1420" y1="170" x2="1420" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="1640" y1="170" x2="1640" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="1880" y1="170" x2="1880" y2="1510" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ============ PHASE 1: 資料收集 ============ -->
  <rect x="10" y="190" width="1960" height="28" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="4"/>
  <text x="20" y="210" font-size="14" font-weight="bold" fill="#7C2D12">階段 1 ─ 資料收集 (System A 自外部 Graph API 拉取原始對話,寫入內部資料庫)</text>

  <!-- Msg 1: Scheduler → A -->
  <line x1="100" y1="240" x2="316" y2="240" stroke="#111827" stroke-width="1.8" marker-end="url(#arrowSync)"/>
  <text x="208" y="232" text-anchor="middle" font-size="12" fill="#111827">1. 觸發批次 (Cron 0 0 * * *)</text>

  <!-- Activation bar A -->
  <rect x="316" y="240" width="8" height="270" fill="#FCA5A5" stroke="#B45309" stroke-width="0.5"/>

  <!-- Loop frame -->
  <rect x="240" y="265" width="430" height="225" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="3 3"/>
  <rect x="240" y="265" width="80" height="20" fill="#E5E7EB" stroke="#6B7280"/>
  <text x="280" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#111827">loop</text>
  <text x="350" y="280" font-size="11" fill="#374151">[對每個目標頻道/聊天 chat_id]</text>

  <!-- Msg 2: A → Graph API -->
  <line x1="324" y1="305" x2="540" y2="305" stroke="#B45309" stroke-width="1.8" marker-end="url(#arrowSensS)"/>
  <text x="432" y="297" text-anchor="middle" font-size="12" fill="#7C2D12">2. GET /chats/{id}/messages?$top=50</text>

  <!-- Activation bar Graph -->
  <rect x="536" y="305" width="8" height="35" fill="#D1D5DB" stroke="#374151" stroke-width="0.5"/>

  <!-- Msg 3: Graph → A -->
  <line x1="540" y1="335" x2="324" y2="335" stroke="#B45309" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arrowSensS)"/>
  <text x="432" y="327" text-anchor="middle" font-size="12" fill="#7C2D12">3. messages[] + @odata.nextLink (敏感)</text>

  <!-- Note: pagination + throttling -->
  <rect x="280" y="350" width="380" height="48" fill="#FEF3C7" stroke="#B45309" stroke-width="1" rx="3"/>
  <text x="470" y="368" text-anchor="middle" font-size="11" fill="#374151">Note: 依 @odata.nextLink 進行 pagination 迴圈</text>
  <text x="470" y="385" text-anchor="middle" font-size="11" fill="#374151">單頻道 1 req/sec 延遲控制 · 429 回應時指數退避</text>

  <!-- Msg 4: A → A self -->
  <path d="M 324 415 L 380 415 L 380 445 L 328 445" fill="none" stroke="#B45309" stroke-width="1.8" marker-end="url(#arrowSensS)"/>
  <text x="395" y="432" font-size="12" fill="#7C2D12">4. 寫入原始對話至內部資料庫 (含 PII,完整可追溯)</text>

  <!-- Loop end label -->
  <text x="350" y="478" font-size="10" fill="#6B7280" font-style="italic">end loop · pagination 結束 → 換下一個 chat_id</text>

  <!-- ============ PHASE 2: 去識別化 ============ -->
  <rect x="10" y="525" width="1960" height="28" fill="#FDF4FF" stroke="#7E22CE" stroke-width="1" rx="4"/>
  <text x="20" y="545" font-size="14" font-weight="bold" fill="#581C87">階段 2 ─ 去識別化 (A/B 交接點:代號重編 → 殘留 PII 掃描 → 轉交 System B)</text>

  <!-- Msg 5: A self -->
  <path d="M 324 580 L 380 580 L 380 610 L 328 610" fill="none" stroke="#B45309" stroke-width="1.8" marker-end="url(#arrowSensS)"/>
  <text x="395" y="597" font-size="12" fill="#7C2D12">5. 跨批次代號重編 (本批 T_n 重新指派 A,B,C…;對照表僅存於 System A)</text>

  <!-- Activation A continues -->
  <rect x="316" y="510" width="8" height="160" fill="#FCA5A5" stroke="#B45309" stroke-width="0.5"/>

  <!-- Msg 6: A → Deid -->
  <line x1="324" y1="650" x2="756" y2="650" stroke="#B45309" stroke-width="1.8" marker-end="url(#arrowSensS)"/>
  <text x="540" y="642" text-anchor="middle" font-size="12" fill="#7C2D12">6. 對話 JSON (已套用本批對照表,代號替換完成)</text>

  <!-- Activation Deid -->
  <rect x="756" y="650" width="8" height="120" fill="#E9D5FF" stroke="#7E22CE" stroke-width="0.5"/>

  <!-- Msg 7: Deid self -->
  <path d="M 764 685 L 820 685 L 820 715 L 768 715" fill="none" stroke="#7E22CE" stroke-width="1.8" marker-end="url(#arrowSync)"/>
  <text x="835" y="702" font-size="12" fill="#581C87">7. PII 殘留掃描 (regex + NER:姓名 / email / 手機 / 工號 / URL)</text>

  <!-- Alt frame -->
  <rect x="690" y="730" width="320" height="40" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="700" y="745" font-size="10" fill="#6B7280" font-style="italic">alt [檢出殘留] → 退回 System A 並標記;else 通過</text>
  <text x="700" y="760" font-size="10" fill="#6B7280" font-style="italic">通過分支繼續 ↓</text>

  <!-- Msg 8: Deid → B -->
  <line x1="764" y1="795" x2="976" y2="795" stroke="#0E7490" stroke-width="1.8" marker-end="url(#arrowDeidS)"/>
  <text x="870" y="787" text-anchor="middle" font-size="12" fill="#0E7490">8. 純代號 JSON (確認無 PII 殘留)</text>

  <!-- ============ PHASE 3: LLM 分析 ============ -->
  <rect x="10" y="820" width="1960" height="28" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1" rx="4"/>
  <text x="20" y="840" font-size="14" font-weight="bold" fill="#1E3A8A">階段 3 ─ LLM 分析 (System B 呼叫外部 LLM,結果寫入分析資料庫,推播警示)</text>

  <!-- Activation B -->
  <rect x="976" y="795" width="8" height="160" fill="#BFDBFE" stroke="#1D4ED8" stroke-width="0.5"/>

  <!-- Msg 9: B → LLM -->
  <line x1="984" y1="875" x2="1196" y2="875" stroke="#0E7490" stroke-width="1.8" marker-end="url(#arrowDeidS)"/>
  <text x="1090" y="867" text-anchor="middle" font-size="12" fill="#0E7490">9. 風險分析請求 (僅代號對話 + 提示詞)</text>

  <!-- Activation LLM -->
  <rect x="1196" y="875" width="8" height="35" fill="#D1D5DB" stroke="#374151" stroke-width="0.5"/>

  <!-- Msg 10: LLM → B -->
  <line x1="1200" y1="905" x2="984" y2="905" stroke="#0E7490" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arrowDeidS)"/>
  <text x="1090" y="897" text-anchor="middle" font-size="12" fill="#0E7490">10. 標註結果 (事件類型 / 風險分數 / 證據片段)</text>

  <!-- Msg 11: B self -->
  <path d="M 984 925 L 1040 925 L 1040 950 L 988 950" fill="none" stroke="#0E7490" stroke-width="1.8" marker-end="url(#arrowDeidS)"/>
  <text x="1055" y="942" font-size="12" fill="#0E7490">11. 寫入分析結果資料庫 (代號化標註 + 事件 ID)</text>

  <!-- Msg 12: B → Dashboard -->
  <line x1="984" y1="985" x2="1416" y2="985" stroke="#0E7490" stroke-width="1.8" marker-end="url(#arrowDeidS)"/>
  <text x="1200" y="977" text-anchor="middle" font-size="12" fill="#0E7490">12. 推播警示 (代號 + 事件 ID + 風險分數)</text>

  <!-- ============ PHASE 4: 授權還原 ============ -->
  <rect x="10" y="1010" width="1960" height="28" fill="#FFF7ED" stroke="#C2410C" stroke-width="1" rx="4"/>
  <text x="20" y="1030" font-size="14" font-weight="bold" fill="#7C2D12">階段 4 ─ 授權還原 (對特定事件重新識別當事人;具備稽核紀錄,違規可追溯)</text>

  <!-- Activation Dashboard -->
  <rect x="1416" y="985" width="8" height="495" fill="#A7F3D0" stroke="#047857" stroke-width="0.5"/>

  <!-- Msg 13: Dashboard → 授權人員 -->
  <line x1="1424" y1="1065" x2="1876" y2="1065" stroke="#374151" stroke-width="1.8" marker-end="url(#arrowOpenS)"/>
  <text x="1650" y="1057" text-anchor="middle" font-size="12" fill="#374151">13. 顯示警示清單 + 單事件脈絡頁面 (代號)</text>

  <!-- Msg 14: 授權人員 → Dashboard -->
  <line x1="1880" y1="1100" x2="1428" y2="1100" stroke="#374151" stroke-width="1.8" marker-end="url(#arrowOpenS)"/>
  <text x="1650" y="1092" text-anchor="middle" font-size="12" fill="#374151">14. 點選「申請還原身分」(指定事件 ID + 填寫理由)</text>

  <!-- Msg 15: Dashboard → Reversal -->
  <line x1="1424" y1="1135" x2="1636" y2="1135" stroke="#374151" stroke-width="1.8" marker-end="url(#arrowOpenS)"/>
  <text x="1530" y="1127" text-anchor="middle" font-size="12" fill="#374151">15. 還原請求 (event_id, applicant, reason)</text>

  <!-- Activation Reversal -->
  <rect x="1636" y="1135" width="8" height="220" fill="#FED7AA" stroke="#C2410C" stroke-width="0.5"/>

  <!-- Msg 16: Reversal self -->
  <path d="M 1644 1170 L 1700 1170 L 1700 1195 L 1648 1195" fill="none" stroke="#C2410C" stroke-width="1.8" marker-end="url(#arrowSync)"/>
  <text x="1715" y="1187" font-size="12" fill="#7C2D12">16. RBAC 角色驗證 + 雙因子 + 寫入稽核日誌</text>

  <!-- Alt frame -->
  <rect x="1500" y="1210" width="460" height="170" fill="none" stroke="#6B7280" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="1510" y="1226" font-size="11" font-weight="bold" fill="#374151">alt [權限通過]</text>

  <!-- Msg 17: Reversal → A (crosses long horizontally) -->
  <line x1="1636" y1="1255" x2="324" y2="1255" stroke="#B45309" stroke-width="1.8" marker-end="url(#arrowSensS)"/>
  <text x="980" y="1247" text-anchor="middle" font-size="12" fill="#7C2D12">17. 對照表查詢 (代號, 批次 ID) — 進入 System A 內部 (敏感操作)</text>

  <!-- Msg 18: A → Reversal -->
  <line x1="324" y1="1290" x2="1636" y2="1290" stroke="#B45309" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arrowSensS)"/>
  <text x="980" y="1282" text-anchor="middle" font-size="12" fill="#7C2D12">18. 真實身分 (UPN / 顯示名稱)</text>

  <!-- Msg 19: Reversal → Dashboard -->
  <line x1="1636" y1="1325" x2="1428" y2="1325" stroke="#B45309" stroke-width="1.8" marker-end="url(#arrowSensS)"/>
  <text x="1530" y="1317" text-anchor="middle" font-size="12" fill="#7C2D12">19. 真實身分 + 一次性還原 token</text>

  <!-- Else branch -->
  <text x="1510" y="1352" font-size="11" font-weight="bold" fill="#374151">else [權限不符]</text>
  <line x1="1636" y1="1372" x2="1428" y2="1372" stroke="#374151" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#arrowOpenS)"/>
  <text x="1530" y="1364" text-anchor="middle" font-size="11" fill="#374151">19'. 拒絕 + 稽核紀錄 (含拒絕原因)</text>

  <!-- Msg 20: Dashboard → 授權人員 -->
  <line x1="1424" y1="1408" x2="1876" y2="1408" stroke="#B45309" stroke-width="1.8" marker-end="url(#arrowSensS)"/>
  <text x="1650" y="1400" text-anchor="middle" font-size="12" fill="#7C2D12">20. 顯示真實身分 (僅當前會話有效;關閉頁面即清除)</text>

  <!-- Footer note -->
  <rect x="40" y="1440" width="1920" height="60" fill="#F9FAFB" stroke="#9CA3AF" stroke-width="1" rx="4"/>
  <text x="60" y="1462" font-size="12" font-weight="bold" fill="#374151">說明</text>
  <text x="60" y="1480" font-size="11" fill="#374151">· 實線箭頭 = 同步請求;虛線箭頭 = 回應 / 非同步 · 黃色 = 控制觸發 · 紅色 = 含 PII 之敏感資料流 · 青色 = 去識別化資料流 · 灰色 = 控制 / 授權操作</text>
  <text x="60" y="1496" font-size="11" fill="#374151">· 階段 1–3 由 Scheduler 自動觸發於每日 00:00;階段 4 由授權人員按需發起,所有操作均寫入不可竄改之稽核日誌</text>

  <!-- Bottom mirror actor labels -->
  <rect x="10" y="1510" width="180" height="50" fill="#FEF3C7" stroke="#B45309" stroke-width="1.5" rx="6"/>
  <text x="100" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">Scheduler</text>
  <rect x="230" y="1510" width="180" height="50" fill="#FEE2E2" stroke="#B45309" stroke-width="1.5" rx="6"/>
  <text x="320" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">System A</text>
  <rect x="450" y="1510" width="180" height="50" fill="#F3F4F6" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="540" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">Graph API</text>
  <rect x="670" y="1510" width="180" height="50" fill="#FDF4FF" stroke="#7E22CE" stroke-width="1.5" rx="6"/>
  <text x="760" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">去識別化模組</text>
  <rect x="890" y="1510" width="180" height="50" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.5" rx="6"/>
  <text x="980" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">System B</text>
  <rect x="1110" y="1510" width="180" height="50" fill="#F3F4F6" stroke="#374151" stroke-width="1.5" rx="6"/>
  <text x="1200" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">外部 LLM</text>
  <rect x="1330" y="1510" width="180" height="50" fill="#ECFDF5" stroke="#047857" stroke-width="1.5" rx="6"/>
  <text x="1420" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">管理後台</text>
  <rect x="1550" y="1510" width="180" height="50" fill="#FFF7ED" stroke="#C2410C" stroke-width="1.5" rx="6"/>
  <text x="1640" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">授權還原模組</text>
  <rect x="1790" y="1510" width="180" height="50" fill="#F5F3FF" stroke="#5B21B6" stroke-width="1.5" rx="6"/>
  <text x="1880" y="1540" text-anchor="middle" font-size="13" font-weight="bold" fill="#111827">授權人員</text>
</svg>
